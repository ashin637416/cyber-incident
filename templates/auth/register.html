{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h2>Create Account</h2>
            <p>Register to report and track cyber incidents</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="needs-validation" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                           placeholder="John Doe" required minlength="2"
                           value="{{ request.form.get('full_name', '') }}">
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="you@example.com" required
                           value="{{ request.form.get('email', '') }}">
                </div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number <small class="text-cyber-muted">(optional)</small></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control" id="phone" name="phone"
                           placeholder="+91 98765 43210"
                           value="{{ request.form.get('phone', '') }}">
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Min 8 chars, 1 uppercase, 1 digit" required minlength="8">
                </div>
                <!-- Password strength bar -->
                <div class="mt-2" style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;">
                    <div id="passwordStrength" style="height:100%;width:0;border-radius:2px;transition:all 0.3s ease;"></div>
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" name="confirm_password"
                           placeholder="Re-enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber w-100 mb-3">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>

            <div class="text-center">
                <span class="text-cyber-muted">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}">Sign in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
